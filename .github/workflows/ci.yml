name: CI

on:
  push:
    branches-ignore:
      - badges
    paths-ignore:
      - "badges/coverage.json"
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility

      - uses: actions/setup-python@v6  # TODO: pin to specific SHA for reproducibility
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build
          pip install pip-audit
          pip install -e .

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Build package
        run: python -m build

      - name: Audit Python dependencies
        run: pip-audit

      - name: Build documentation site
        run: |
          python scripts/build_docs.py
          python -m mkdocs build --strict

      - name: Run unit tests with coverage
        run: |
          pytest -m "not integration" --cov=zoom_sdk --cov-report=term --cov-report=xml --cov-fail-under=95

  badge:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility

      - uses: actions/setup-python@v6  # TODO: pin to specific SHA for reproducibility
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Rebuild coverage report for badge publication
        run: |
          pytest -m "not integration" --cov=zoom_sdk --cov-report=xml --cov-fail-under=95

      - name: Write coverage badge payload
        run: |
          python scripts/write_coverage_badge.py \
            --input coverage.xml \
            --output badges/coverage.json \
            --label "coverage (${{ github.ref_name }})"

      - name: Publish coverage badge to badges branch
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          WORKTREE_DIR="../badges-worktree"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf "${WORKTREE_DIR}"

          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git fetch --no-tags origin badges:refs/remotes/origin/badges
            git worktree add "${WORKTREE_DIR}" origin/badges
            (
              cd "${WORKTREE_DIR}"
              git checkout -B badges origin/badges
            )
          else
            git worktree add --detach "${WORKTREE_DIR}"
            (
              cd "${WORKTREE_DIR}"
              git checkout --orphan badges
              find . -mindepth 1 -maxdepth 1 \
                ! -name .git \
                -exec rm -rf {} +
            )
          fi

          mkdir -p "${WORKTREE_DIR}/branch-coverage/${BRANCH_NAME}"
          cp badges/coverage.json \
            "${WORKTREE_DIR}/branch-coverage/${BRANCH_NAME}/coverage.json"
          touch "${WORKTREE_DIR}/.nojekyll"

          (
            cd "${WORKTREE_DIR}"
            if git diff --quiet -- branch-coverage/"${BRANCH_NAME}"/coverage.json .nojekyll; then
              exit 0
            fi
            git add branch-coverage/"${BRANCH_NAME}"/coverage.json .nojekyll
            git commit -m "ci: update ${BRANCH_NAME} coverage badge [skip ci]"
            git push origin badges
          )

  integration:
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read
    if: |
      (github.event_name == 'push' &&
        (github.ref_name == 'staging' || github.ref_name == 'main')) ||
      (github.event_name == 'pull_request' &&
        (github.base_ref == 'staging' || github.base_ref == 'main'))
    env:
      ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
      ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
      ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
      ZOOM_BASE_URL: ${{ secrets.ZOOM_BASE_URL }}
      ZOOM_OAUTH_URL: ${{ secrets.ZOOM_OAUTH_URL }}
      ZOOM_TOKEN_SKEW_SECONDS: ${{ secrets.ZOOM_TOKEN_SKEW_SECONDS }}
    steps:
      - uses: actions/checkout@v6  # TODO: pin to specific SHA for reproducibility

      - uses: actions/setup-python@v6  # TODO: pin to specific SHA for reproducibility
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run integration tests
        run: pytest -m integration
